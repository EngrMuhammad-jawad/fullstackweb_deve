<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Js Events</title>
  </head>
  <body>
    <!-- events -->
    <h1>JavaScript Events</h1>

    <button id="myButton">Click Me</button>
    <button id="myButton2">Click Me Too</button>
    <input type="text" id="inputfld" placeholder="Type something..." />
    <script>
      // click event
      document
        .getElementById("myButton")
        .addEventListener("click", function () {
          alert("Button was clicked!");
        });

      // mouseover event
      document
        .getElementById("myButton")
        .addEventListener("mouseover", function () {
          this.style.backgroundColor = "lightblue";
        });

      document
        .getElementById("myButton")
        .addEventListener("mouseout", function () {
          this.style.backgroundColor = "";
        });

      // keydown event
      document.addEventListener("keydown", function (event) {
        console.log("Key pressed: " + event.key);
      });
      document.addEventListener("keyup", function (event) {
        console.log("Key released: " + event.key);
      });
      document
        .getElementById("myButton2")
        .addEventListener("dblclick", function (event) {
          alert("Double clicked (count: " + event.detail + ")");
        });
      document
        .getElementById("inputfld")
        .addEventListener("change", function (event) {
          alert("Value changed: " + event.target.value);
        });
    </script>
  </body>
</html>
